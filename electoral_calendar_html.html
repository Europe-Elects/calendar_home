<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electoral Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #fff;
    color: #222;
    padding: 0;
  }

  .ec-header {
    background: #1a2236;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 18px;
  }
  .ec-header span {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .ec-header a {
    color: #f0b429;
    font-size: 12px;
    text-decoration: none;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: #f7f7f5;
    color: #666;
    font-size: 12px;
    font-weight: 600;
    padding: 9px 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
    white-space: nowrap;
  }

  tbody td {
    padding: 9px 10px;
    border-bottom: 1px solid #ebebeb;
    vertical-align: middle;
    color: #222;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }

  /* Type colours — matched to original Datawrapper palette */
  .type-parliament   { background: #3a7bd5; }
  .type-referendum   { background: #7c3aed; }
  .type-regional     { background: #16a34a; }
  .type-presidential { background: #ea580c; }
  .type-other        { background: #64748b; }

  .status-confirmed    { color: #222; }
  .status-unconfirmed  { color: #999; }

  .credit {
    font-size: 11px;
    color: #aaa;
    padding: 8px 10px;
  }
  .credit a { color: #3a7bd5; text-decoration: none; }

  #loading, #error {
    padding: 2rem;
    text-align: center;
    color: #888;
    font-size: 13px;
  }
  #error { color: #c00; display: none; }
</style>
</head>
<body>

<div class="ec-header">
  <span>Electoral Calendar</span>
  <a href="https://docs.google.com/spreadsheets/d/1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM/" target="_blank">Full Calendar →</a>
</div>

<div id="loading">Loading…</div>
<div id="error">Could not load data. Make sure the sheet is published to the web as CSV.</div>

<div class="table-wrap" id="table-wrap" style="display:none;">
  <table id="ec-table">
    <thead id="ec-head"></thead>
    <tbody id="ec-body"></tbody>
  </table>
  <p class="credit">Data from <a href="https://docs.google.com/spreadsheets/d/1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM/" target="_blank">Google Sheets</a></p>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  const SHEET_ID = "1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM";
  const GID      = "1530371858";
  const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  // Column index that holds the election "Type" value (0-based).
  // Adjust if your sheet columns are in a different order.
  const TYPE_COL   = 2;   // e.g. column C
  const STATUS_COL = 6;   // e.g. column G  — set to -1 to skip

  // ── TYPE → CSS CLASS ────────────────────────────────────────────────────────
  function typeClass(val) {
    const v = (val || "").toLowerCase();
    if (v.includes("parliament") || v.includes("by-election")) return "type-parliament";
    if (v.includes("referendum"))   return "type-referendum";
    if (v.includes("regional"))     return "type-regional";
    if (v.includes("presidential") || v.includes("head of state")) return "type-presidential";
    return "type-other";
  }

  function statusClass(val) {
    return (val || "").toLowerCase().includes("not") ? "status-unconfirmed" : "status-confirmed";
  }

  // ── CSV PARSER (handles quoted fields with commas/newlines) ─────────────────
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i + 1];
      if (inQ) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQ = false; }
        else { field += c; }
      } else {
        if (c === '"') { inQ = true; }
        else if (c === ',') { row.push(field.trim()); field = ""; }
        else if (c === '\n' || (c === '\r' && next === '\n')) {
          if (c === '\r') i++;
          row.push(field.trim()); field = "";
          if (row.some(f => f !== "")) rows.push(row);
          row = [];
        } else { field += c; }
      }
    }
    if (field || row.length) { row.push(field.trim()); if (row.some(f => f !== "")) rows.push(row); }
    return rows;
  }

  // ── COUNTRY → FLAG EMOJI ────────────────────────────────────────────────────
  const FLAGS = {
    "united kingdom": "🇬🇧", "uk": "🇬🇧",
    "switzerland": "🇨🇭",
    "kosovo": "🇽🇰",
    "slovakia": "🇸🇰",
    "iceland": "🇮🇸",
    "san marino": "🇸🇲",
    "estonia": "🇪🇪",
    "france": "🇫🇷", "germany": "🇩🇪", "italy": "🇮🇹", "spain": "🇪🇸",
    "poland": "🇵🇱", "netherlands": "🇳🇱", "belgium": "🇧🇪",
    "austria": "🇦🇹", "sweden": "🇸🇪", "norway": "🇳🇴",
    "denmark": "🇩🇰", "finland": "🇫🇮", "portugal": "🇵🇹",
    "czech republic": "🇨🇿", "hungary": "🇭🇺", "romania": "🇷🇴",
    "bulgaria": "🇧🇬", "croatia": "🇭🇷", "serbia": "🇷🇸",
    "ukraine": "🇺🇦", "greece": "🇬🇷", "turkey": "🇹🇷",
    "russia": "🇷🇺", "ireland": "🇮🇪", "luxembourg": "🇱🇺",
    "malta": "🇲🇹", "cyprus": "🇨🇾", "latvia": "🇱🇻",
    "lithuania": "🇱🇹", "slovenia": "🇸🇮", "slovakia": "🇸🇰",
    "albania": "🇦🇱", "moldova": "🇲🇩", "georgia": "🇬🇪",
    "armenia": "🇦🇲", "azerbaijan": "🇦🇿", "belarus": "🇧🇾",
    "montenegro": "🇲🇪", "north macedonia": "🇲🇰", "bosnia": "🇧🇦",
    "liechtenstein": "🇱🇮", "monaco": "🇲🇨", "andorra": "🇦🇩",
  };

  function flag(country) {
    return FLAGS[(country || "").toLowerCase().trim()] || "";
  }

  // ── RENDER ──────────────────────────────────────────────────────────────────
  function render(rows) {
    if (rows.length < 2) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
      return;
    }

    const headers = rows[0];
    const data    = rows.slice(1);

    // Header row
    const thead = document.getElementById("ec-head");
    const htr   = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      htr.appendChild(th);
    });
    thead.appendChild(htr);

    // Data rows
    const tbody = document.getElementById("ec-body");
    data.forEach(cols => {
      const tr = document.createElement("tr");
      cols.forEach((val, i) => {
        const td = document.createElement("td");

        if (i === 0) {
          // Country column — prepend flag
          td.textContent = (flag(val) ? flag(val) + " " : "") + val;
        } else if (i === TYPE_COL) {
          // Type column — coloured badge
          const badge = document.createElement("span");
          badge.className = "badge " + typeClass(val);
          badge.textContent = val;
          td.appendChild(badge);
        } else if (STATUS_COL >= 0 && i === STATUS_COL) {
          // Date status column
          const s = document.createElement("span");
          s.className = statusClass(val);
          s.textContent = val;
          td.appendChild(s);
        } else {
          td.textContent = val;
        }

        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    document.getElementById("loading").style.display   = "none";
    document.getElementById("table-wrap").style.display = "block";
  }

  // ── FETCH ───────────────────────────────────────────────────────────────────
  fetch(CSV_URL)
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(text => render(parseCSV(text)))
    .catch(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display   = "block";
    });
</script>
</body>
</html>
