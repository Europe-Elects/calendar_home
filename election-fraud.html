<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Fraud – Europe Elects</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    background: #fff;
    color: #1a1a1a;
    padding: 0 0 2rem;
  }

  .page-header {
    border-bottom: 3px solid #f0b429;
    padding: 1.25rem 0 0.75rem;
    margin-bottom: 2rem;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .page-header p {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .card {
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 1.1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #f0b429; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #888;
    flex-wrap: wrap;
  }

  .card-date { color: #f0b429; font-weight: 500; }

  .card-author::before { content: "By "; }

  .card h2 {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
  }
  .card h2 a {
    color: #1a1a1a;
    text-decoration: none;
  }
  .card h2 a:hover { text-decoration: underline; color: #1a2236; }

  .card-excerpt {
    font-size: 13px;
    color: #555;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: auto;
    padding-top: 0.5rem;
  }
  .tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 3px;
    background: #f4f4f4;
    color: #555;
    text-decoration: none;
  }
  .tag:hover { background: #e8e8e8; }
  .tag.active { background: #1a2236; color: #fff; }

  .load-more {
    display: block;
    margin: 2rem auto 0;
    padding: 9px 24px;
    background: #1a2236;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .load-more:hover { background: #2a3a56; }
  .load-more:disabled { background: #ccc; cursor: default; }

  #loading, #error {
    padding: 2rem;
    text-align: center;
    color: #888;
    font-size: 14px;
  }
  #error { color: #c00; display: none; }

  .count {
    font-size: 12px;
    color: #999;
    text-align: center;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Election Fraud</h1>
  <p id="subtitle">Loading articles&hellip;</p>
</div>

<div id="loading">Loading&hellip;</div>
<div id="error">Could not load articles. Please try again later.</div>
<div class="grid" id="grid"></div>
<p class="count" id="count" style="display:none;"></p>
<button class="load-more" id="load-more" style="display:none;">Load more</button>

<script>
  const SITE     = "https://europeelects.eu";
  const TAG_SLUG = "election-fraud";
  const PER_PAGE = 12;

  let tagId    = null;
  let page     = 1;
  let total    = 0;
  let tagCache = {}; // id → name+link

  // ── STRIP HTML ────────────────────────────────────────────────────────────
  function stripHtml(html) {
    const d = document.createElement("div");
    d.innerHTML = html;
    return d.textContent || "";
  }

  // ── FORMAT DATE ───────────────────────────────────────────────────────────
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  }

  // ── FETCH TAG NAMES ───────────────────────────────────────────────────────
  async function fetchTagNames(ids) {
    const missing = ids.filter(id => !tagCache[id]);
    if (!missing.length) return;
    const url = SITE + "/wp-json/wp/v2/tags?include=" + missing.join(",") + "&per_page=100";
    const r = await fetch(url);
    const data = await r.json();
    data.forEach(t => { tagCache[t.id] = { name: t.name, link: t.link }; });
  }

  // ── RENDER CARDS ─────────────────────────────────────────────────────────
  function renderCards(posts) {
    const grid = document.getElementById("grid");
    posts.forEach(post => {
      const card = document.createElement("div");
      card.className = "card";

      // Meta
      const meta = document.createElement("div");
      meta.className = "card-meta";
      const dateEl = document.createElement("span");
      dateEl.className = "card-date";
      dateEl.textContent = formatDate(post.date);
      meta.appendChild(dateEl);

      if (post._embedded && post._embedded.author && post._embedded.author[0]) {
        const authorEl = document.createElement("span");
        authorEl.className = "card-author";
        authorEl.textContent = post._embedded.author[0].name;
        meta.appendChild(authorEl);
      }
      card.appendChild(meta);

      // Title
      const h2 = document.createElement("h2");
      const a = document.createElement("a");
      a.href = post.link;
      a.target = "_blank";
      a.innerHTML = post.title.rendered;
      h2.appendChild(a);
      card.appendChild(h2);

      // Excerpt
      if (post.excerpt && post.excerpt.rendered) {
        const exc = document.createElement("p");
        exc.className = "card-excerpt";
        exc.textContent = stripHtml(post.excerpt.rendered);
        card.appendChild(exc);
      }

      // Tags
      if (post.tags && post.tags.length) {
        const tagsDiv = document.createElement("div");
        tagsDiv.className = "card-tags";
        post.tags.forEach(id => {
          const t = tagCache[id];
          if (!t) return;
          const span = document.createElement("a");
          span.className = "tag" + (id === tagId ? " active" : "");
          span.textContent = t.name;
          span.href = t.link;
          span.target = "_blank";
          tagsDiv.appendChild(span);
        });
        card.appendChild(tagsDiv);
      }

      grid.appendChild(card);
    });
  }

  // ── FETCH POSTS ───────────────────────────────────────────────────────────
  async function fetchPosts() {
    const btn = document.getElementById("load-more");
    btn.disabled = true;
    btn.textContent = "Loading…";

    try {
      const url = SITE + "/wp-json/wp/v2/posts?tags=" + tagId +
        "&per_page=" + PER_PAGE + "&page=" + page +
        "&_embed=author&_fields=id,date,title,excerpt,link,tags,_embedded,_links";
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);

      total = parseInt(r.headers.get("X-WP-Total") || "0");
      const posts = await r.json();

      // Collect all tag IDs from this batch and fetch their names
      const allTagIds = [...new Set(posts.flatMap(p => p.tags || []))];
      await fetchTagNames(allTagIds);

      renderCards(posts);

      const loaded = (page - 1) * PER_PAGE + posts.length;
      document.getElementById("count").style.display = "block";
      document.getElementById("count").textContent = "Showing " + loaded + " of " + total + " articles";
      document.getElementById("subtitle").textContent = total + " articles tagged Election Fraud";

      if (loaded < total) {
        page++;
        btn.disabled = false;
        btn.textContent = "Load more";
        btn.style.display = "block";
      } else {
        btn.style.display = "none";
      }
    } catch(e) {
      document.getElementById("error").style.display = "block";
      btn.style.display = "none";
    }
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    try {
      const r = await fetch(SITE + "/wp-json/wp/v2/tags?slug=" + TAG_SLUG);
      const tags = await r.json();
      if (!tags.length) throw new Error("Tag not found");
      tagId = tags[0].id;
      tagCache[tagId] = { name: tags[0].name, link: tags[0].link };

      document.getElementById("loading").style.display = "none";
      document.getElementById("load-more").style.display = "block";

      await fetchPosts();
    } catch(e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
    }
  }

  document.getElementById("load-more").addEventListener("click", fetchPosts);
  init();
</script>
</body>
</html>
