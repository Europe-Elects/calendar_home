<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electoral Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #fff;
    color: #222;
    padding: 0;
  }
  .ec-header {
    background: #1a2236;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 18px;
  }
  .ec-header span {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .ec-header a { color: #f0b429; font-size: 12px; text-decoration: none; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: #f7f7f5;
    color: #666;
    font-size: 12px;
    font-weight: 600;
    padding: 9px 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
    white-space: nowrap;
  }
  tbody td {
    padding: 9px 10px;
    border-bottom: 1px solid #ebebeb;
    vertical-align: middle;
    color: #222;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }
  .type-parliament   { background: #3a7bd5; }
  .type-referendum   { background: #7c3aed; }
  .type-regional     { background: #16a34a; }
  .type-presidential { background: #ea580c; }
  .type-other        { background: #64748b; }
  .muted { color: #999; }
  .credit { font-size: 11px; color: #aaa; padding: 8px 10px; }
  .credit a { color: #3a7bd5; text-decoration: none; }
  #loading { padding: 2rem; text-align: center; color: #888; font-size: 13px; }
  #error   { padding: 2rem; text-align: center; color: #c00; font-size: 13px; display: none; }
</style>
</head>
<body>

<div class="ec-header">
  <span>Electoral Calendar</span>
  <a href="https://docs.google.com/spreadsheets/d/1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM/" target="_blank">Full Calendar &rarr;</a>
</div>

<div id="loading">Loading&hellip;</div>
<div id="error">Could not load data. Make sure the Google Sheet is published to the web as CSV.</div>

<div class="table-wrap" id="table-wrap" style="display:none;">
  <table id="ec-table">
    <thead id="ec-head"></thead>
    <tbody id="ec-body"></tbody>
  </table>
  <p class="credit">Data from <a href="https://docs.google.com/spreadsheets/d/1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM/" target="_blank">Google Sheets</a></p>
</div>

<script>
  const SHEET_ID = "1Wdx_eDbVv2XaMlSoYnzauLch_47xWHjP181iVV8QIrM";
  const GID      = "1530371858";
  const CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSSf9yMeW9d5iFhTsKq-OFbBC4rMTPc7em-9Yg1symor1RdPMSkCfLrAOZ11zBfBI3Gg-g7QuxWwkgd/pub?gid=1530371858&single=true&output=csv";

  // ── COLUMN INDEXES (0-based) ─────────────────────────────────────────────
  // A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7
  const COL_FLAG    = 0;  // A — shortcode e.g. :gb:
  const COL_COUNTRY = 1;  // B — country name
  const COL_TYPE    = 3;  // D — election type
  const COL_DATE    = 6;  // G — (Expected) Date
  const COL_STATUS  = 7;  // H — Date Status

  // ── SHORTCODE → FLAG EMOJI (Unicode escapes, no literals) ───────────────
  const FLAGS = {
    "al": "\uD83C\uDDE6\uD83C\uDDF1",
    "ad": "\uD83C\uDDE6\uD83C\uDDE9",
    "am": "\uD83C\uDDE6\uD83C\uDDF2",
    "at": "\uD83C\uDDE6\uD83C\uDDF9",
    "az": "\uD83C\uDDE6\uD83C\uDDFF",
    "by": "\uD83C\uDDE7\uD83C\uDDFE",
    "be": "\uD83C\uDDE7\uD83C\uDDEA",
    "ba": "\uD83C\uDDE7\uD83C\uDDE6",
    "bg": "\uD83C\uDDE7\uD83C\uDDEC",
    "hr": "\uD83C\uDDED\uD83C\uDDF7",
    "cy": "\uD83C\uDDE8\uD83C\uDDFE",
    "cz": "\uD83C\uDDE8\uD83C\uDDFF",
    "dk": "\uD83C\uDDE9\uD83C\uDDF0",
    "ee": "\uD83C\uDDEA\uD83C\uDDEA",
    "fi": "\uD83C\uDDEB\uD83C\uDDEE",
    "fr": "\uD83C\uDDEB\uD83C\uDDF7",
    "ge": "\uD83C\uDDEC\uD83C\uDDEA",
    "de": "\uD83C\uDDE9\uD83C\uDDEA",
    "gr": "\uD83C\uDDEC\uD83C\uDDF7",
    "hu": "\uD83C\uDDED\uD83C\uDDFA",
    "is": "\uD83C\uDDEE\uD83C\uDDF8",
    "ie": "\uD83C\uDDEE\uD83C\uDDEA",
    "it": "\uD83C\uDDEE\uD83C\uDDF9",
    "xk": "\uD83C\uDDFD\uD83C\uDDF0",
    "lv": "\uD83C\uDDF1\uD83C\uDDFB",
    "li": "\uD83C\uDDF1\uD83C\uDDEE",
    "lt": "\uD83C\uDDF1\uD83C\uDDF9",
    "lu": "\uD83C\uDDF1\uD83C\uDDFA",
    "mt": "\uD83C\uDDF2\uD83C\uDDF9",
    "md": "\uD83C\uDDF2\uD83C\uDDE9",
    "mc": "\uD83C\uDDF2\uD83C\uDDE8",
    "me": "\uD83C\uDDF2\uD83C\uDDEA",
    "nl": "\uD83C\uDDF3\uD83C\uDDF1",
    "mk": "\uD83C\uDDF2\uD83C\uDDF0",
    "no": "\uD83C\uDDF3\uD83C\uDDF4",
    "pl": "\uD83C\uDDF5\uD83C\uDDF1",
    "pt": "\uD83C\uDDF5\uD83C\uDDF9",
    "ro": "\uD83C\uDDF7\uD83C\uDDF4",
    "ru": "\uD83C\uDDF7\uD83C\uDDFA",
    "sm": "\uD83C\uDDF8\uD83C\uDDF2",
    "rs": "\uD83C\uDDF7\uD83C\uDDF8",
    "sk": "\uD83C\uDDF8\uD83C\uDDF0",
    "si": "\uD83C\uDDF8\uD83C\uDDEE",
    "es": "\uD83C\uDDEA\uD83C\uDDF8",
    "se": "\uD83C\uDDF8\uD83C\uDDEA",
    "ch": "\uD83C\uDDE8\uD83C\uDDED",
    "tr": "\uD83C\uDDF9\uD83C\uDDF7",
    "ua": "\uD83C\uDDFA\uD83C\uDDE6",
    "gb": "\uD83C\uDDEC\uD83C\uDDE7",
    "eu": "\uD83C\uDDEA\uD83C\uDDFA",
    "us": "\uD83C\uDDFA\uD83C\uDDF8"
  };

  function shortcodeToFlag(val) {
    if (!val) return "";
    const m = val.trim().match(/^:([a-z_]+):$/);
    if (!m) return "";
    return FLAGS[m[1]] || "";
  }

  // ── TYPE → BADGE CLASS ───────────────────────────────────────────────────
  function typeClass(val) {
    const v = (val || "").toLowerCase();
    if (v.includes("parliament") || v.includes("lower house") || v.includes("upper house") || v.includes("by-election") || v.includes("legislative")) return "type-parliament";
    if (v.includes("referendum") || v.includes("initiative") || v.includes("plebiscite")) return "type-referendum";
    if (v.includes("regional") || v.includes("local") || v.includes("municipal") || v.includes("cantonal") || v.includes("provincial")) return "type-regional";
    if (v.includes("presidential") || v.includes("head of state") || v.includes("prime minister")) return "type-presidential";
    return "type-other";
  }

  function isUnconfirmed(val) {
    const v = (val || "").toLowerCase();
    return v.includes("not") || v.includes("unconfirmed") || v.includes("tentative");
  }

  // ── CSV PARSER ───────────────────────────────────────────────────────────
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i + 1];
      if (inQ) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQ = false; }
        else { field += c; }
      } else {
        if (c === '"') { inQ = true; }
        else if (c === ',') { row.push(field.trim()); field = ""; }
        else if (c === '\n' || (c === '\r' && next === '\n')) {
          if (c === '\r') i++;
          row.push(field.trim()); field = "";
          if (row.some(f => f !== "")) rows.push(row);
          row = [];
        } else { field += c; }
      }
    }
    if (field !== "" || row.length) { row.push(field.trim()); if (row.some(f => f !== "")) rows.push(row); }
    return rows;
  }

  // ── RENDER ───────────────────────────────────────────────────────────────
  function render(rows) {
    if (rows.length < 2) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
      return;
    }

    const headers = rows[0];
    const data    = rows.slice(1);

    // Build header row — skip col A (flag), label col B as "Country"
    const thead = document.getElementById("ec-head");
    const htr = document.createElement("tr");
    headers.forEach((h, i) => {
      if (i === COL_FLAG) return; // hide the raw shortcode column
      const th = document.createElement("th");
      th.textContent = h;
      htr.appendChild(th);
    });
    thead.appendChild(htr);

    // Data rows
    const tbody = document.getElementById("ec-body");
    data.forEach(cols => {
      const tr = document.createElement("tr");

      // Determine if this row is "not confirmed"
      const statusVal = cols[COL_STATUS] || "";
      const unconfirmed = isUnconfirmed(statusVal);

      cols.forEach((val, i) => {
        if (i === COL_FLAG) return; // skip — merged into country cell

        const td = document.createElement("td");

        if (i === COL_COUNTRY) {
          // Merge flag from col A + country name from col B
          const flag = shortcodeToFlag(cols[COL_FLAG] || "");
          td.textContent = (flag ? flag + " " : "") + val;

        } else if (i === COL_TYPE) {
          const badge = document.createElement("span");
          badge.className = "badge " + typeClass(val);
          badge.textContent = val;
          td.appendChild(badge);

        } else if (i === COL_DATE) {
          td.textContent = val;
          if (unconfirmed) td.classList.add("muted");

        } else if (i === COL_STATUS) {
          td.textContent = val;
          if (unconfirmed) td.classList.add("muted");

        } else {
          td.textContent = val;
        }

        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("table-wrap").style.display = "block";
  }

  // ── FETCH ────────────────────────────────────────────────────────────────
  fetch(CSV_URL)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(text => render(parseCSV(text)))
    .catch(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
    });
</script>
</body>
</html>
